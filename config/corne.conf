# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_MOUSE=y

# Disable deep sleep — split halves fail to wake reliably over BLE.
# Idle mode still activates (lower power, BLE stays alive) so battery
# life is reasonable (~1 week) without the wake-up problems.
CONFIG_ZMK_SLEEP=n
